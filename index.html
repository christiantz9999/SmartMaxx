<!DOCTYPE html>
<html lang="pt-br">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>SmartMaxx | Compra 100% Segura</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.0.0/css/all.min.css">
    <style>
        .modal-view { transition: transform 0.3s ease-in-out; transform: translateX(100%); }
        .modal-view.active { transform: translateX(0); }
        .modal-up { transition: transform 0.3s ease-in-out; transform: translateY(100%); }
        .modal-up.active { transform: translateY(0); }
        body { font-family: 'Inter', sans-serif; background-color: #f8fafc; }
        .secure-badge { background: linear-gradient(90deg, #065f46 0%, #059669 100%); }
    </style>
</head>
<body class="pb-24">

    <div class="secure-badge text-white text-[10px] py-1.5 flex justify-center items-center gap-4 font-bold uppercase tracking-wider">
        <span><i class="fas fa-shield-check mr-1"></i> Site 100% Confiável</span>
        <span class="opacity-50">|</span>
        <span><i class="fas fa-lock mr-1"></i> Compra 100% Segura</span>
    </div>

    <header class="bg-white shadow-sm sticky top-0 z-50 px-4 py-4 flex justify-between items-center">
        <div class="flex items-center gap-3">
            <div class="w-10 h-10 bg-blue-700 rounded-xl flex items-center justify-center text-white shadow-lg shadow-blue-200">
                <i class="fas fa-bolt"></i>
            </div>
            <h1 class="font-black text-xl text-slate-800 tracking-tighter">SMARTMAXX</h1>
        </div>
        <div class="flex gap-2">
            <button onclick="openAuthModal('admin')" class="p-2 text-slate-400"><i class="fas fa-cog"></i></button>
            <button onclick="toggleCart()" class="relative p-2 bg-slate-100 rounded-full text-slate-700">
                <i class="fas fa-shopping-bag text-xl"></i>
                <span id="cart-count" class="absolute -top-1 -right-1 bg-blue-600 text-white text-[10px] font-bold rounded-full w-5 h-5 flex items-center justify-center hidden">0</span>
            </button>
        </div>
    </header>

    <main class="grid grid-cols-2 gap-4 p-4" id="product-grid"></main>

    <div id="product-page" class="fixed inset-0 z-[80] bg-white modal-view hidden flex flex-col">
        <div class="p-4 flex justify-between items-center border-b">
            <button onclick="closeProductPage()" class="text-slate-800 p-2"><i class="fas fa-arrow-left text-xl"></i></button>
            <span class="text-xs font-bold text-green-600 uppercase tracking-widest"><i class="fas fa-check-circle"></i> Em Estoque</span>
            <div class="w-10"></div>
        </div>
        
        <div class="flex-1 overflow-y-auto">
            <div class="bg-slate-50 p-8 flex justify-center">
                <img id="view-img" src="" class="max-h-[300px] object-contain drop-shadow-2xl">
            </div>
            
            <div class="p-6 space-y-4">
                <h2 id="view-title" class="text-2xl font-black text-slate-800 leading-tight"></h2>
                <div id="view-price" class="text-3xl font-black text-blue-700"></div>
                
                <div class="flex items-center gap-4 py-4 border-y border-slate-100">
                    <span class="font-bold text-slate-500">Quantidade:</span>
                    <div class="flex items-center gap-4 bg-slate-100 rounded-full p-1 px-4">
                        <button onclick="changeViewQty(-1)" class="text-xl font-bold p-2">-</button>
                        <span id="view-qty" class="font-black text-lg w-6 text-center">1</span>
                        <button onclick="changeViewQty(1)" class="text-xl font-bold p-2 text-blue-600">+</button>
                    </div>
                </div>

                <div class="space-y-2">
                    <h4 class="font-bold text-slate-800 uppercase text-xs tracking-widest">Descrição do Produto</h4>
                    <p id="view-desc" class="text-slate-500 text-sm leading-relaxed"></p>
                </div>

                <div class="grid grid-cols-2 gap-3 pt-4">
                    <div class="bg-slate-50 p-3 rounded-2xl flex items-center gap-2 border border-slate-100">
                        <i class="fas fa-truck text-blue-600"></i>
                        <span class="text-[10px] font-bold text-slate-600">Envio Imediato</span>
                    </div>
                    <div class="bg-slate-50 p-3 rounded-2xl flex items-center gap-2 border border-slate-100">
                        <i class="fas fa-shield-alt text-green-600"></i>
                        <span class="text-[10px] font-bold text-slate-600">Garantia Apple</span>
                    </div>
                </div>
            </div>
        </div>

        <div class="p-6 border-t bg-white shadow-[0_-10px_20px_rgba(0,0,0,0.02)]">
            <button id="add-to-cart-btn" class="w-full bg-blue-700 text-white py-5 rounded-[20px] font-black text-lg flex items-center justify-center gap-3 active:scale-95 transition-transform">
                ADICIONAR AO CARRINHO <i class="fas fa-shopping-basket"></i>
            </button>
        </div>
    </div>

    <div id="cart-modal" class="fixed inset-0 z-[90] bg-black/60 hidden opacity-0 transition-opacity duration-300">
        <div class="modal-up fixed bottom-0 left-0 right-0 bg-white rounded-t-[40px] h-[90vh] flex flex-col">
            <div class="p-6 flex justify-between items-center border-b">
                <h3 class="text-xl font-black text-slate-800 italic">CHECKOUT SEGURO</h3>
                <button onclick="toggleCart()" class="text-slate-400 p-2"><i class="fas fa-times text-xl"></i></button>
            </div>
            
            <div id="cart-content" class="flex-1 overflow-y-auto p-6 space-y-6">
                <div id="cart-items-list" class="space-y-4"></div>

                <div class="bg-slate-50 p-4 rounded-2xl border-2 border-dashed border-slate-200">
                    <div class="flex gap-2">
                        <input type="text" id="coupon-input" placeholder="CUPOM DE DESCONTO" class="flex-1 bg-white p-3 rounded-xl outline-none text-xs font-bold uppercase">
                        <button onclick="applyCoupon()" class="bg-slate-800 text-white px-4 rounded-xl text-[10px] font-bold">APLICAR</button>
                    </div>
                </div>

                <div class="space-y-4">
                    <h4 class="font-bold text-slate-700 uppercase text-xs tracking-widest"><i class="fas fa-credit-card mr-2"></i> Pagamento e Entrega</h4>
                    <select id="c-pay" class="w-full p-4 bg-slate-100 rounded-2xl font-bold text-slate-600 outline-none">
                        <option>Pix (Desconto Especial)</option>
                        <option>Cartão de Crédito em 18x</option>
                        <option>Cartão de Débito</option>
                        <option>Boleto Bancário</option>
                    </select>
                    <textarea id="c-addr" placeholder="Endereço de Entrega Completo" class="w-full p-4 bg-slate-100 rounded-2xl h-24 outline-none"></textarea>
                </div>
            </div>

            <div class="p-6 border-t bg-white shadow-2xl">
                <div class="flex justify-between items-center mb-4">
                    <span class="text-slate-400 font-bold uppercase text-xs">Valor Total</span>
                    <span id="cart-total" class="text-3xl font-black text-blue-700"></span>
                </div>
                <button onclick="finishOrder()" class="w-full bg-green-500 text-white py-5 rounded-[20px] font-black text-lg flex items-center justify-center gap-3">
                    COMPRAR PELO WHATSAPP <i class="fab fa-whatsapp text-2xl"></i>
                </button>
                <div class="flex justify-center mt-4 gap-4 opacity-40 grayscale">
                   <i class="fab fa-cc-visa text-2xl"></i>
                   <i class="fab fa-cc-mastercard text-2xl"></i>
                   <i class="fas fa-barcode text-2xl"></i>
                </div>
            </div>
        </div>
    </div>

    <div id="auth-modal" class="fixed inset-0 z-[100] bg-black/80 hidden flex items-center justify-center p-6">
        <div class="bg-white w-full max-w-sm rounded-3xl p-6 space-y-4">
            <h2 class="text-xl font-bold text-center">Acesso Restrito</h2>
            <input type="text" id="login-user" placeholder="Usuário" class="w-full p-4 bg-slate-100 rounded-xl">
            <input type="password" id="login-pass" placeholder="Senha" class="w-full p-4 bg-slate-100 rounded-xl">
            <button onclick="handleLogin()" class="w-full bg-blue-700 text-white py-4 rounded-xl font-bold">Entrar</button>
            <button onclick="document.getElementById('auth-modal').classList.add('hidden')" class="w-full text-slate-400 py-2">Voltar</button>
        </div>
    </div>

    <div id="admin-panel" class="fixed inset-0 z-[110] bg-slate-50 hidden flex flex-col p-6 overflow-y-auto">
        <div class="flex justify-between mb-6">
            <h2 class="text-2xl font-black">Painel de Controle</h2>
            <button onclick="location.reload()" class="p-2"><i class="fas fa-times text-xl"></i></button>
        </div>
        <div class="space-y-4 bg-white p-6 rounded-3xl shadow-sm">
            <input type="text" id="p-name" placeholder="Nome do Produto" class="w-full p-4 bg-slate-100 rounded-xl">
            <input type="number" id="p-price" placeholder="Preço" class="w-full p-4 bg-slate-100 rounded-xl">
            <input type="text" id="p-img" placeholder="URL da Imagem" class="w-full p-4 bg-slate-100 rounded-xl">
            <textarea id="p-desc" placeholder="Descrição Detalhada" class="w-full p-4 bg-slate-100 rounded-xl h-24"></textarea>
            <button onclick="saveProduct()" class="w-full bg-blue-700 text-white py-4 rounded-xl font-bold">Salvar Produto</button>
        </div>
        <div id="admin-list" class="mt-8 space-y-3"></div>
    </div>

    <script>
        const WHATSAPP = "5573998630214";
        const ADMIN_USER = "smartmaxx";
        const ADMIN_PASS = "Cb593713@@";
        
        let cart = [];
        let viewQty = 1;
        let selectedProduct = null;
        let discount = 0;

        let products = JSON.parse(localStorage.getItem('smartmaxx_db')) || [
            { id: 1, name: "iPhone 17 Pro Max 256GB", price: 9550, image: "https://m.media-amazon.com/images/I/81Os1SDWpcL._AC_SL1500_.jpg", desc: "O mais novo lançamento com tela ProMotion, câmera de 48MP e bateria de longa duração." },
            { id: 2, name: "iPhone 15 128GB", price: 4900, image: "https://m.media-amazon.com/images/I/71d7rfSl0wL._AC_SL1500_.jpg", desc: "Performance incrível com chip A16 Bionic e design em alumínio aeroespacial." }
        ];

        function renderProducts() {
            const grid = document.getElementById('product-grid');
            grid.innerHTML = products.map(p => `
                <div onclick="openProductPage(${p.id})" class="bg-white p-3 rounded-[32px] shadow-sm group active:scale-95 transition-all">
                    <div class="aspect-square bg-slate-50 rounded-[24px] mb-3 p-4 flex items-center justify-center">
                        <img src="${p.image}" class="max-h-full object-contain">
                    </div>
                    <h3 class="text-[11px] font-black text-slate-800 uppercase px-1 line-clamp-2 h-7">${p.name}</h3>
                    <div class="flex justify-between items-center mt-2 px-1">
                        <span class="text-blue-700 font-black text-sm">R$ ${p.price.toLocaleString('pt-BR')}</span>
                        <div class="w-7 h-7 bg-slate-900 text-white rounded-full flex items-center justify-center text-[10px]"><i class="fas fa-plus"></i></div>
                    </div>
                </div>
            `).join('');
        }

        // PÁGINA DO PRODUTO
        function openProductPage(id) {
            selectedProduct = products.find(p => p.id === id);
            viewQty = 1;
            document.getElementById('view-img').src = selectedProduct.image;
            document.getElementById('view-title').innerText = selectedProduct.name;
            document.getElementById('view-price').innerText = `R$ ${selectedProduct.price.toLocaleString('pt-BR')}`;
            document.getElementById('view-desc').innerText = selectedProduct.desc || "Produto novo, lacrado com 1 ano de garantia oficial.";
            document.getElementById('view-qty').innerText = viewQty;
            
            document.getElementById('add-to-cart-btn').onclick = () => addToCart(selectedProduct.id, viewQty);
            
            const page = document.getElementById('product-page');
            page.classList.remove('hidden');
            setTimeout(() => page.classList.add('active'), 10);
        }

        function closeProductPage() {
            const page = document.getElementById('product-page');
            page.classList.remove('active');
            setTimeout(() => page.classList.add('hidden'), 300);
        }

        function changeViewQty(d) {
            viewQty = Math.max(1, viewQty + d);
            document.getElementById('view-qty').innerText = viewQty;
        }

        function addToCart(id, qty) {
            const prod = products.find(p => p.id === id);
            const inCart = cart.find(i => i.id === id);
            if(inCart) inCart.qty += qty; else cart.push({...prod, qty: qty});
            
            updateCartUI();
            closeProductPage();
            toggleCart();
        }

        // CARRINHO
        function updateCartUI() {
            const count = cart.reduce((a, b) => a + b.qty, 0);
            const total = cart.reduce((a, b) => a + (b.price * b.qty), 0) - discount;
            
            document.getElementById('cart-count').innerText = count;
            document.getElementById('cart-count').classList.toggle('hidden', count === 0);
            document.getElementById('cart-total').innerText = `R$ ${Math.max(0, total).toLocaleString('pt-BR', {minimumFractionDigits: 2})}`;
            
            const list = document.getElementById('cart-items-list');
            list.innerHTML = cart.map(i => `
                <div class="flex items-center gap-4 bg-slate-50 p-4 rounded-3xl border border-slate-100">
                    <img src="${i.image}" class="w-12 h-12 object-contain">
                    <div class="flex-1">
                        <div class="text-[10px] font-black text-slate-800 uppercase">${i.name}</div>
                        <div class="text-blue-600 font-bold text-xs">R$ ${i.price.toLocaleString('pt-BR')}</div>
                    </div>
                    <div class="flex items-center gap-3">
                        <button onclick="changeCartQty(${i.id},-1)" class="w-6 h-6 bg-white rounded-full shadow-sm text-xs font-bold">-</button>
                        <span class="text-xs font-black">${i.qty}</span>
                        <button onclick="changeCartQty(${i.id},1)" class="w-6 h-6 bg-white rounded-full shadow-sm text-xs font-bold text-blue-600">+</button>
                    </div>
                </div>
            `).join('');
        }

        function changeCartQty(id, d) {
            const i = cart.find(x => x.id === id);
            i.qty += d;
            if(i.qty <= 0) cart = cart.filter(x => x.id !== id);
            updateCartUI();
        }

        function toggleCart() {
            const m = document.getElementById('cart-modal');
            const c = m.querySelector('.modal-up');
            if(m.classList.contains('hidden')){
                m.classList.remove('hidden');
                setTimeout(() => { m.classList.add('opacity-100'); c.classList.add('active'); }, 10);
            } else {
                m.classList.remove('opacity-100'); c.classList.remove('active');
                setTimeout(() => m.classList.add('hidden'), 300);
            }
        }

        function finishOrder() {
            const addr = document.getElementById('c-addr').value;
            const pay = document.getElementById('c-pay').value;
            if(!addr) return alert("Por favor, preencha o endereço de entrega.");

            let msg = `*🛍️ NOVO PEDIDO - SMARTMAXX*%0A%0A`;
            msg += `*📍 ENDEREÇO:* ${addr}%0A`;
            msg += `*💳 PAGAMENTO:* ${pay}%0A%0A`;
            msg += `*ITENS:*%0A`;
            cart.forEach(i => { msg += `• ${i.qty}x ${i.name}%0A`; });
            
            const total = cart.reduce((a, b) => a + (b.price * b.qty), 0) - discount;
            msg += `%0A*TOTAL: R$ ${total.toLocaleString('pt-BR')}*%0A%0A`;
            msg += `_✅ Compra iniciada pelo Site Seguro_`;

            window.open(`https://wa.me/${WHATSAPP}?text=${msg}`);
        }

        function applyCoupon() {
            const code = document.getElementById('coupon-input').value.toUpperCase();
            if(code === "SMART100") {
                discount = 100;
                alert("Cupom SMART100 aplicado! R$ 100,00 de desconto.");
                updateCartUI();
            } else { alert("Cupom inválido!"); }
        }

        // ADMIN
        function openAuthModal() { document.getElementById('auth-modal').classList.remove('hidden'); }
        function handleLogin() {
            if(document.getElementById('login-user').value === ADMIN_USER && document.getElementById('login-pass').value === ADMIN_PASS) {
                document.getElementById('auth-modal').classList.add('hidden');
                document.getElementById('admin-panel').classList.remove('hidden');
                renderAdminList();
            } else { alert("Senha incorreta!"); }
        }

        function saveProduct() {
            const name = document.getElementById('p-name').value;
            const price = parseFloat(document.getElementById('p-price').value);
            const img = document.getElementById('p-img').value;
            const desc = document.getElementById('p-desc').value;
            if(!name || !price) return;
            
            products.push({ id: Date.now(), name, price, image: img, desc });
            localStorage.setItem('smartmaxx_db', JSON.stringify(products));
            renderProducts(); renderAdminList();
            alert("Produto Salvo!");
        }

        function deleteProduct(id) {
            products = products.filter(p => p.id !== id);
            localStorage.setItem('smartmaxx_db', JSON.stringify(products));
            renderProducts(); renderAdminList();
        }

        function renderAdminList() {
            document.getElementById('admin-list').innerHTML = products.map(p => `
                <div class="bg-white p-4 rounded-2xl flex justify-between items-center shadow-sm">
                    <span class="text-xs font-bold">${p.name}</span>
                    <button onclick="deleteProduct(${p.id})" class="text-red-500 p-2"><i class="fas fa-trash"></i></button>
                </div>
            `).join('');
        }

        renderProducts();
        updateCartUI();
    </script>
</body>
</html>
