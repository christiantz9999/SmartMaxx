<!DOCTYPE html>
<html lang="pt-br">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>SmartMaxx | Compra 100% Segura</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.0.0/css/all.min.css">
    <style>
        .modal-view { transition: transform 0.3s ease-in-out; transform: translateX(100%); }
        .modal-view.active { transform: translateX(0); }
        .modal-up { transition: transform 0.3s ease-in-out; transform: translateY(100%); }
        .modal-up.active { transform: translateY(0); }
        body { font-family: 'Inter', sans-serif; background-color: #f8fafc; }
        .secure-badge { background: linear-gradient(90deg, #065f46 0%, #059669 100%); }
        .no-scrollbar::-webkit-scrollbar { display: none; }
        .category-btn.active { background-color: #1d4ed8; color: white; border-color: #1d4ed8; }
    </style>
</head>
<body class="pb-24">

    <div class="secure-badge text-white text-[10px] py-1.5 flex justify-center items-center gap-4 font-bold uppercase tracking-wider">
        <span><i class="fas fa-shield-check mr-1"></i> Site 100% Confiável</span>
        <span class="opacity-50">|</span>
        <span><i class="fas fa-lock mr-1"></i> Compra 100% Segura</span>
    </div>

    <header class="bg-white shadow-sm sticky top-0 z-50 px-4 py-4 flex justify-between items-center">
        <div class="flex items-center gap-3">
            <div class="w-10 h-10 bg-blue-700 rounded-xl flex items-center justify-center text-white shadow-lg shadow-blue-200">
                <i class="fas fa-bolt"></i>
            </div>
            <h1 class="font-black text-xl text-slate-800 tracking-tighter">SMARTMAXX</h1>
        </div>
        <div class="flex gap-2">
            <button onclick="openClientAuthModal()" class="p-2 text-slate-400 hover:text-blue-600 transition-colors">
                <i class="fas fa-user"></i>
            </button>
            <button onclick="openAuthModal('admin')" class="p-2 text-slate-400 hover:text-slate-600 transition-colors">
                <i class="fas fa-cog"></i>
            </button>
            <button onclick="toggleCart()" class="relative p-2 bg-slate-100 rounded-full text-slate-700">
                <i class="fas fa-shopping-bag text-xl"></i>
                <span id="cart-count" class="absolute -top-1 -right-1 bg-blue-600 text-white text-[10px] font-bold rounded-full w-5 h-5 flex items-center justify-center hidden">0</span>
            </button>
        </div>
    </header>

    <div class="bg-blue-50 border-b border-blue-100 p-2 text-center text-[11px] font-bold text-blue-800 tracking-wide uppercase shadow-sm">
        Aparelhos Novos 1 Ano de Garantia
Aparelhos Semi-Novos 3 meses de Garantia
    </div>

    <nav class="flex gap-2 overflow-x-auto p-4 no-scrollbar bg-white shadow-sm">
        <button onclick="filterByCategory('TODOS')" class="category-btn active px-5 py-2 rounded-full border border-slate-200 text-xs font-black whitespace-nowrap transition-all" data-cat="TODOS">TODOS</button>
        <button onclick="filterByCategory('XIAOMI')" class="category-btn px-5 py-2 rounded-full border border-slate-200 text-xs font-black whitespace-nowrap transition-all" data-cat="XIAOMI">XIAOMI</button>
        <button onclick="filterByCategory('IPHONES')" class="category-btn px-5 py-2 rounded-full border border-slate-200 text-xs font-black whitespace-nowrap transition-all" data-cat="IPHONES">IPHONES</button>
        <button onclick="filterByCategory('OUTROS')" class="category-btn px-5 py-2 rounded-full border border-slate-200 text-xs font-black whitespace-nowrap transition-all" data-cat="OUTROS">OUTROS</button>
        <button onclick="filterByCategory('ACESSÓRIOS')" class="category-btn px-5 py-2 rounded-full border border-slate-200 text-xs font-black whitespace-nowrap transition-all" data-cat="ACESSÓRIOS">ACESSÓRIOS</button>
    </nav>

    <main class="grid grid-cols-2 gap-4 p-4" id="product-grid"></main>

    <footer class="mt-4 mb-8 px-4 flex justify-center gap-4">
        <a href="https://wa.me/5573998630214" target="_blank" class="bg-green-500 text-white px-6 py-3 rounded-2xl font-bold flex items-center gap-2 shadow-lg shadow-green-200 active:scale-95 transition-transform text-sm">
            <i class="fab fa-whatsapp text-xl"></i> WhatsApp
        </a>
        <a href="#" target="_blank" class="bg-gradient-to-tr from-yellow-400 via-pink-500 to-purple-600 text-white px-6 py-3 rounded-2xl font-bold flex items-center gap-2 shadow-lg shadow-pink-200 active:scale-95 transition-transform text-sm">
            <i class="fab fa-instagram text-xl"></i> Instagram
        </a>
    </footer>

    <div id="product-page" class="fixed inset-0 z-[80] bg-white modal-view hidden flex flex-col">
        <div class="p-4 flex justify-between items-center border-b">
            <button onclick="closeProductPage()" class="text-slate-800 p-2"><i class="fas fa-arrow-left text-xl"></i></button>
            <span class="text-xs font-bold text-green-600 uppercase tracking-widest"><i class="fas fa-check-circle"></i> Em Estoque</span>
            <div class="w-10"></div>
        </div>
        <div class="flex-1 overflow-y-auto">
            <div class="bg-slate-50 p-8 flex justify-center">
                <img id="view-img" src="" class="max-h-[300px] object-contain drop-shadow-2xl">
            </div>
            <div class="p-6 space-y-4">
                <h2 id="view-title" class="text-2xl font-black text-slate-800 leading-tight"></h2>
                <div id="view-price" class="text-3xl font-black text-blue-700"></div>
                <div class="flex items-center gap-4 py-4 border-y border-slate-100">
                    <span class="font-bold text-slate-500">Quantidade:</span>
                    <div class="flex items-center gap-4 bg-slate-100 rounded-full p-1 px-4">
                        <button onclick="changeViewQty(-1)" class="text-xl font-bold p-2">-</button>
                        <span id="view-qty" class="font-black text-lg w-6 text-center">1</span>
                        <button onclick="changeViewQty(1)" class="text-xl font-bold p-2 text-blue-600">+</button>
                    </div>
                </div>
                <div class="space-y-2">
                    <h4 class="font-bold text-slate-800 uppercase text-xs tracking-widest">Descrição do Produto</h4>
                    <p id="view-desc" class="text-slate-500 text-sm leading-relaxed"></p>
                </div>
            </div>
        </div>
        <div class="p-6 border-t bg-white">
            <button id="add-to-cart-btn" class="w-full bg-blue-700 text-white py-5 rounded-[20px] font-black text-lg flex items-center justify-center gap-3 active:scale-95 transition-transform">
                ADICIONAR AO CARRINHO <i class="fas fa-shopping-basket"></i>
            </button>
        </div>
    </div>

    <div id="cart-modal" class="fixed inset-0 z-[90] bg-black/60 hidden opacity-0 transition-opacity duration-300">
        <div class="modal-up fixed bottom-0 left-0 right-0 bg-white rounded-t-[40px] h-[90vh] flex flex-col">
            <div class="p-6 flex justify-between items-center border-b">
                <h3 class="text-xl font-black text-slate-800 italic">CHECKOUT SEGURO</h3>
                <button onclick="toggleCart()" class="text-slate-400 p-2"><i class="fas fa-times text-xl"></i></button>
            </div>
            
            <div id="cart-content" class="flex-1 overflow-y-auto p-6 space-y-6">
                <div id="cart-items-list" class="space-y-4"></div>

                <div class="bg-slate-50 p-4 rounded-2xl border-2 border-dashed border-slate-200">
                    <div class="flex gap-2">
                        <input type="text" id="coupon-input" placeholder="CUPOM DE DESCONTO" class="flex-1 bg-white p-3 rounded-xl outline-none text-xs font-bold uppercase">
                        <button onclick="applyCoupon()" class="bg-slate-800 text-white px-4 rounded-xl text-[10px] font-bold">APLICAR</button>
                    </div>
                </div>

                <div class="space-y-4">
                    <h4 class="font-bold text-slate-700 uppercase text-xs tracking-widest"><i class="fas fa-credit-card mr-2"></i> Pagamento e Entrega</h4>
                    
                    <div id="guest-fields" class="space-y-3">
                        <div class="grid grid-cols-2 gap-3">
                            <input type="text" id="c-name" placeholder="Nome" class="w-full p-3 bg-slate-100 rounded-xl text-sm">
                            <input type="text" id="c-lastname" placeholder="Sobrenome" class="w-full p-3 bg-slate-100 rounded-xl text-sm">
                        </div>
                        <input type="tel" id="c-phone" placeholder="Telefone (WhatsApp)" class="w-full p-3 bg-slate-100 rounded-xl text-sm">
                    </div>

                    <select id="c-pay" class="w-full p-4 bg-slate-100 rounded-2xl font-bold text-slate-600 outline-none">
                        <option>Pix (Desconto Especial)</option>
                        <option>Cartão de Crédito</option>
                        <option>Dinheiro</option>
                    </select>
                    <textarea id="c-addr" placeholder="Endereço de Entrega Completo" class="w-full p-4 bg-slate-100 rounded-2xl h-24 outline-none"></textarea>
                </div>
            </div>

            <div class="p-6 border-t bg-white">
                <div class="flex justify-between items-center mb-4">
                    <span class="text-slate-400 font-bold uppercase text-xs">Valor Total</span>
                    <span id="cart-total" class="text-3xl font-black text-blue-700"></span>
                </div>
                <button onclick="finishOrder()" class="w-full bg-green-500 text-white py-5 rounded-[20px] font-black text-lg flex items-center justify-center gap-3">
                    COMPRAR PELO WHATSAPP <i class="fab fa-whatsapp text-2xl"></i>
                </button>
            </div>
        </div>
    </div>

    <div id="client-auth-modal" class="fixed inset-0 z-[100] bg-black/80 hidden flex items-center justify-center p-6">
        <div class="bg-white w-full max-w-sm rounded-3xl p-6 space-y-4">
            <div class="flex justify-between items-center">
                <h2 id="client-auth-title" class="text-2xl font-black">Login Cliente</h2>
                <button onclick="document.getElementById('client-auth-modal').classList.add('hidden')" class="text-slate-400"><i class="fas fa-times"></i></button>
            </div>
            
            <div id="login-section" class="space-y-4">
                <input type="text" id="client-login-cpf" placeholder="CPF (apenas números)" class="w-full p-4 bg-slate-100 rounded-xl">
                <button onclick="handleClientLogin()" class="w-full bg-blue-700 text-white py-4 rounded-xl font-bold">Entrar</button>
                <p class="text-center text-sm text-slate-500">Novo por aqui? <button onclick="toggleClientAuthMode()" class="text-blue-700 font-bold">Criar Conta</button></p>
            </div>

            <div id="register-section" class="space-y-3 hidden">
                <div class="grid grid-cols-2 gap-3">
                    <input type="text" id="reg-nome" placeholder="Nome" class="w-full p-3 bg-slate-100 rounded-xl">
                    <input type="text" id="reg-sobrenome" placeholder="Sobrenome" class="w-full p-3 bg-slate-100 rounded-xl">
                </div>
                <input type="text" id="reg-cpf" placeholder="CPF" class="w-full p-3 bg-slate-100 rounded-xl">
                <input type="tel" id="reg-telefone" placeholder="Telefone" class="w-full p-3 bg-slate-100 rounded-xl">
                <textarea id="reg-endereco" placeholder="Endereço Completo" class="w-full p-3 bg-slate-100 rounded-xl h-20"></textarea>
                <button onclick="handleClientRegister()" class="w-full bg-green-600 text-white py-4 rounded-xl font-bold">Salvar Cadastro</button>
            </div>
        </div>
    </div>

    <div id="auth-modal" class="fixed inset-0 z-[100] bg-black/80 hidden flex items-center justify-center p-6">
        <div class="bg-white w-full max-w-sm rounded-3xl p-6 space-y-4">
            <h2 class="text-xl font-bold text-center">Admin Access</h2>
            <input type="text" id="login-user" placeholder="Usuário" class="w-full p-4 bg-slate-100 rounded-xl">
            <input type="password" id="login-pass" placeholder="Senha" class="w-full p-4 bg-slate-100 rounded-xl">
            <button onclick="handleAdminLogin()" class="w-full bg-slate-800 text-white py-4 rounded-xl font-bold">Entrar</button>
        </div>
    </div>

    <script>
        const WHATSAPP = "5573998630214";
        const ADMIN_USER = "smartmaxx";
        const ADMIN_PASS = "Cb593713@@";
        
        let products = JSON.parse(localStorage.getItem('smartmaxx_db')) || [
            { id: 1, name: "iPhone 15 Pro Max 256GB", price: 8900, image: "https://m.media-amazon.com/images/I/81Os1SDWpcL._AC_SL1500_.jpg", category: "IPHONES", desc: "Novo Lacrado, 1 ano de Garantia Apple." },
            { id: 2, name: "Xiaomi 14 Ultra", price: 6500, image: "https://m.media-amazon.com/images/I/61k99U0r48L._AC_SL1200_.jpg", category: "XIAOMI", desc: "Câmera Leica, performance topo de linha." },
            { id: 3, name: "AirPods Pro 2", price: 1800, image: "https://m.media-amazon.com/images/I/61f1YfFpA5L._AC_SL1500_.jpg", category: "ACESSÓRIOS", desc: "Som imersivo e cancelamento de ruído." }
        ];

        let cart = [];
        let usersDB = JSON.parse(localStorage.getItem('smartmaxx_users')) || [];
        let currentUser = JSON.parse(localStorage.getItem('smartmaxx_current_user')) || null;
        let discountPercent = 0;
        let currentCategory = "TODOS";

        function renderProducts() {
            const grid = document.getElementById('product-grid');
            const filtered = currentCategory === "TODOS" ? products : products.filter(p => p.category === currentCategory);
            
            grid.innerHTML = filtered.map(p => `
                <div onclick="openProductPage(${p.id})" class="bg-white p-3 rounded-[32px] shadow-sm active:scale-95 transition-all cursor-pointer border border-slate-100">
                    <div class="aspect-square bg-slate-50 rounded-[24px] mb-3 p-4 flex items-center justify-center">
                        <img src="${p.image}" class="max-h-full object-contain">
                    </div>
                    <h3 class="text-[10px] font-black text-slate-800 uppercase px-1 line-clamp-2 h-7">${p.name}</h3>
                    <div class="flex justify-between items-center mt-2 px-1">
                        <span class="text-blue-700 font-black text-xs">R$ ${p.price.toLocaleString('pt-BR')}</span>
                        <div class="w-6 h-6 bg-slate-900 text-white rounded-full flex items-center justify-center text-[8px]"><i class="fas fa-plus"></i></div>
                    </div>
                </div>
            `).join('');
        }

        function filterByCategory(cat) {
            currentCategory = cat;
            document.querySelectorAll('.category-btn').forEach(btn => {
                btn.classList.toggle('active', btn.dataset.cat === cat);
            });
            renderProducts();
        }

        function loadCart() {
            const key = currentUser ? `cart_${currentUser.cpf}` : 'cart_anon';
            cart = JSON.parse(localStorage.getItem(key)) || [];
            updateCartUI();
        }

        function saveCart() {
            const key = currentUser ? `cart_${currentUser.cpf}` : 'cart_anon';
            localStorage.setItem(key, JSON.stringify(cart));
        }

        function updateCartUI() {
            const count = cart.reduce((a, b) => a + b.qty, 0);
            const subtotal = cart.reduce((a, b) => a + (b.price * b.qty), 0);
            const total = subtotal * (1 - discountPercent);
            
            document.getElementById('cart-count').innerText = count;
            document.getElementById('cart-count').classList.toggle('hidden', count === 0);
            document.getElementById('cart-total').innerText = `R$ ${total.toLocaleString('pt-BR', {minimumFractionDigits: 2})}`;
            
            document.getElementById('cart-items-list').innerHTML = cart.map(i => `
                <div class="flex items-center gap-4 bg-slate-50 p-4 rounded-3xl border border-slate-100">
                    <img src="${i.image}" class="w-10 h-10 object-contain">
                    <div class="flex-1">
                        <div class="text-[10px] font-black uppercase line-clamp-1">${i.name}</div>
                        <div class="text-blue-600 font-bold text-xs">R$ ${i.price.toLocaleString('pt-BR')}</div>
                    </div>
                    <div class="flex items-center gap-2">
                        <button onclick="changeCartQty(${i.id},-1)" class="w-6 h-6 bg-white rounded-full shadow-sm text-xs">-</button>
                        <span class="text-xs font-black">${i.qty}</span>
                        <button onclick="changeCartQty(${i.id},1)" class="w-6 h-6 bg-white rounded-full shadow-sm text-xs text-blue-600">+</button>
                    </div>
                </div>
            `).join('');

            const guestFields = document.getElementById('guest-fields');
            if(currentUser) {
                guestFields.classList.add('hidden');
                document.getElementById('c-addr').value = currentUser.endereco;
            } else {
                guestFields.classList.remove('hidden');
            }
        }

        function changeCartQty(id, d) {
            const i = cart.find(x => x.id === id);
            i.qty += d;
            if(i.qty <= 0) cart = cart.filter(x => x.id !== id);
            saveCart();
            updateCartUI();
        }

        function applyCoupon() {
            const code = document.getElementById('coupon-input').value.trim().toUpperCase();
            if(code === "SMART30") {
                discountPercent = 0.30;
                alert("Cupom SMART30 aplicado! 30% de desconto.");
            } else if(code === "SMART20") {
                discountPercent = 0.20;
                alert("Cupom SMART20 aplicado! 20% de desconto.");
            } else {
                alert("Cupom inválido.");
                discountPercent = 0;
            }
            updateCartUI();
        }

        function finishOrder() {
            if(cart.length === 0) return alert("Seu carrinho está vazio.");

            let nome, sobrenome, telefone, endereco;

            if (currentUser) {
                nome = currentUser.nome;
                sobrenome = currentUser.sobrenome;
                telefone = currentUser.telefone;
                endereco = document.getElementById('c-addr').value;
            } else {
                nome = document.getElementById('c-name').value.trim();
                sobrenome = document.getElementById('c-lastname').value.trim();
                telefone = document.getElementById('c-phone').value.trim();
                endereco = document.getElementById('c-addr').value.trim();
            }

            if(!nome || !sobrenome || !telefone || !endereco) {
                alert("⚠️ ATENÇÃO: Para finalizar, preencha Nome, Sobrenome, Telefone e Endereço.");
                if(!currentUser) {
                    toggleCart();
                    openClientAuthModal();
                    toggleClientAuthMode();
                }
                return;
            }

            let msg = `*🛍️ NOVO PEDIDO - SMARTMAXX*%0A%0A`;
            msg += `*👤 CLIENTE:* ${nome} ${sobrenome}%0A`;
            msg += `*📞 CONTATO:* ${telefone}%0A`;
            msg += `*📍 ENDEREÇO:* ${endereco}%0A`;
            msg += `*💳 PAGAMENTO:* ${document.getElementById('c-pay').value}%0A%0A`;
            msg += `*ITENS:*%0A`;
            cart.forEach(i => { msg += `• ${i.qty}x ${i.name}%0A`; });
            
            const subtotal = cart.reduce((a, b) => a + (b.price * b.qty), 0);
            const total = subtotal * (1 - discountPercent);
            msg += `%0A*TOTAL: R$ ${total.toLocaleString('pt-BR')}*%0A%0A`;
            msg += `🛡️ *Compra Segura* 🛡️`; // Assinatura adicionada

            // Correção da aba em branco: redirecionamento direto
            const url = `https://wa.me/${WHATSAPP}?text=${msg}`;
            window.location.href = url;
        }

        function toggleClientAuthMode() {
            const isLogin = document.getElementById('login-section').classList.contains('hidden');
            document.getElementById('login-section').classList.toggle('hidden', !isLogin);
            document.getElementById('register-section').classList.toggle('hidden', isLogin);
            document.getElementById('client-auth-title').innerText = isLogin ? "Login Cliente" : "Novo Cadastro";
        }

        function openClientAuthModal() {
            if (currentUser) {
                if (confirm(`Sair da conta de ${currentUser.nome}?`)) {
                    currentUser = null;
                    localStorage.removeItem('smartmaxx_current_user');
                    loadCart();
                    alert("Você saiu.");
                }
            } else {
                document.getElementById('client-auth-modal').classList.remove('hidden');
            }
        }

        function handleClientRegister() {
            const nome = document.getElementById('reg-nome').value;
            const sobrenome = document.getElementById('reg-sobrenome').value;
            const cpf = document.getElementById('reg-cpf').value;
            const telefone = document.getElementById('reg-telefone').value;
            const endereco = document.getElementById('reg-endereco').value;

            if(!nome || !sobrenome || !cpf || !telefone || !endereco) return alert("Preencha todos os campos.");

            const user = { nome, sobrenome, cpf, telefone, endereco };
            usersDB.push(user);
            localStorage.setItem('smartmaxx_users', JSON.stringify(usersDB));
            currentUser = user;
            localStorage.setItem('smartmaxx_current_user', JSON.stringify(currentUser));
            
            document.getElementById('client-auth-modal').classList.add('hidden');
            loadCart();
            alert("Cadastro realizado!");
        }

        function handleClientLogin() {
            const cpf = document.getElementById('client-login-cpf').value;
            const user = usersDB.find(u => u.cpf === cpf);
            if(user) {
                currentUser = user;
                localStorage.setItem('smartmaxx_current_user', JSON.stringify(currentUser));
                document.getElementById('client-auth-modal').classList.add('hidden');
                loadCart();
                alert(`Olá, ${user.nome}!`);
            } else {
                alert("CPF não encontrado.");
            }
        }

        function openProductPage(id) {
            const p = products.find(x => x.id === id);
            document.getElementById('view-img').src = p.image;
            document.getElementById('view-title').innerText = p.name;
            document.getElementById('view-price').innerText = `R$ ${p.price.toLocaleString('pt-BR')}`;
            document.getElementById('view-desc').innerText = p.desc;
            document.getElementById('view-qty').innerText = "1";
            document.getElementById('add-to-cart-btn').onclick = () => {
                const qty = parseInt(document.getElementById('view-qty').innerText);
                const inCart = cart.find(i => i.id === p.id);
                if(inCart) inCart.qty += qty; else cart.push({...p, qty: qty});
                saveCart(); updateCartUI(); closeProductPage(); toggleCart();
            };
            const page = document.getElementById('product-page');
            page.classList.remove('hidden');
            setTimeout(() => page.classList.add('active'), 10);
        }

        function closeProductPage() {
            const page = document.getElementById('product-page');
            page.classList.remove('active');
            setTimeout(() => page.classList.add('hidden'), 300);
        }

        function changeViewQty(d) {
            const el = document.getElementById('view-qty');
            let q = parseInt(el.innerText) + d;
            if(q < 1) q = 1;
            el.innerText = q;
        }

        function toggleCart() {
            const m = document.getElementById('cart-modal');
            const c = m.querySelector('.modal-up');
            if(m.classList.contains('hidden')){
                updateCartUI();
                m.classList.remove('hidden');
                setTimeout(() => { m.classList.add('opacity-100'); c.classList.add('active'); }, 10);
            } else {
                m.classList.remove('opacity-100'); c.classList.remove('active');
                setTimeout(() => m.classList.add('hidden'), 300);
            }
        }

        function openAuthModal() { document.getElementById('auth-modal').classList.remove('hidden'); }
        function handleAdminLogin() {
            if(document.getElementById('login-user').value === ADMIN_USER && document.getElementById('login-pass').value === ADMIN_PASS) {
                alert("Acesso Admin Liberado.");
                document.getElementById('auth-modal').classList.add('hidden');
            } else { alert("Senha incorreta!"); }
        }

        renderProducts();
        loadCart();
    </script>
</body>
</html>
